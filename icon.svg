<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1812"/>
      <stop offset="100%" stop-color="#2a2018"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8893c"/>
      <stop offset="100%" stop-color="#f5b040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e8893c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e8893c" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#e8893c" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="12" y="12" width="488" height="488" rx="102" fill="none" stroke="#3d3428" stroke-width="1.5"/>
  <!-- Glow behind chart -->
  <ellipse cx="270" cy="200" rx="180" ry="120" fill="url(#glow)"/>
  <!-- Chart area fill -->
  <path d="M110 340 L190 280 L270 260 L350 170 L400 120 L400 340 Z" fill="#e8893c" opacity="0.12"/>
  <!-- Chart line (bold, glowing) -->
  <polyline points="110,340 190,280 270,260 350,170 400,120" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  <!-- Data dots -->
  <circle cx="110" cy="340" r="12" fill="#e8893c" stroke="#1e1812" stroke-width="3"/>
  <circle cx="190" cy="280" r="12" fill="#e8893c" stroke="#1e1812" stroke-width="3"/>
  <circle cx="270" cy="260" r="12" fill="#e8893c" stroke="#1e1812" stroke-width="3"/>
  <circle cx="350" cy="170" r="12" fill="#f0a050" stroke="#1e1812" stroke-width="3"/>
  <circle cx="400" cy="120" r="16" fill="#f5b040" stroke="#1e1812" stroke-width="3"/>
  <!-- Arrow tip on last point -->
  <polygon points="400,104 412,120 400,112 388,120" fill="#f5b040"/>
  <!-- Dollar sign — large, centered below chart -->
  <text x="160" y="460" text-anchor="middle" font-size="100" font-weight="900" fill="url(#gold)" font-family="-apple-system, system-ui, Arial, sans-serif" opacity="0.15">$</text>
  <!-- App name -->
  <text x="256" y="448" text-anchor="middle" font-size="88" font-weight="900" letter-spacing="-2" fill="url(#gold)" font-family="-apple-system, system-ui, Arial, sans-serif">ECON</text>
  <text x="256" y="484" text-anchor="middle" font-size="32" font-weight="700" letter-spacing="8" fill="#b5a48a" font-family="-apple-system, system-ui, Arial, sans-serif">LEARN</text>
</svg>
