<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a3c"/>
      <stop offset="100%" stop-color="#e87020"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff8e8"/>
    </linearGradient>
    <linearGradient id="areafill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Bright orange background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="#ffb870" stroke-width="1.5" opacity="0.4"/>
  <!-- Chart area fill -->
  <path d="M100 340 L180 290 L260 270 L340 180 L400 110 L400 340 Z" fill="url(#areafill)"/>
  <!-- Chart line (white, bold, glowing) -->
  <polyline points="100,340 180,290 260,270 340,180 400,110" fill="none" stroke="url(#line)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Data dots (white with orange stroke) -->
  <circle cx="100" cy="340" r="11" fill="#ffffff" stroke="#e07020" stroke-width="3"/>
  <circle cx="180" cy="290" r="11" fill="#ffffff" stroke="#e07020" stroke-width="3"/>
  <circle cx="260" cy="270" r="11" fill="#ffffff" stroke="#e07020" stroke-width="3"/>
  <circle cx="340" cy="180" r="12" fill="#ffffff" stroke="#e07020" stroke-width="3"/>
  <circle cx="400" cy="110" r="16" fill="#ffffff" stroke="#e07020" stroke-width="3"/>
  <!-- Upward arrow on last dot -->
  <path d="M400 95 L408 108 L400 103 L392 108 Z" fill="#ffffff"/>
  <!-- Dollar sign watermark -->
  <text x="150" y="455" text-anchor="middle" font-size="100" font-weight="900" fill="#ffffff" font-family="-apple-system, system-ui, Arial, sans-serif" opacity="0.12">$</text>
  <!-- App name (white on orange) -->
  <text x="256" y="448" text-anchor="middle" font-size="90" font-weight="900" letter-spacing="-2" fill="#ffffff" font-family="-apple-system, system-ui, Arial, sans-serif">ECON</text>
  <text x="256" y="486" text-anchor="middle" font-size="34" font-weight="700" letter-spacing="8" fill="#fff0d8" font-family="-apple-system, system-ui, Arial, sans-serif">LEARN</text>
</svg>
