<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc247"/>
      <stop offset="35%" stop-color="#f59520"/>
      <stop offset="70%" stop-color="#e07010"/>
      <stop offset="100%" stop-color="#b85208"/>
    </linearGradient>
    <linearGradient id="chart-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a030"/>
      <stop offset="100%" stop-color="#d87020"/>
    </linearGradient>
  </defs>
  <!-- Warm orange gradient background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- White circle ring -->
  <circle cx="256" cy="210" r="120" fill="none" stroke="#ffffff" stroke-width="22"/>
  <!-- Chart line inside circle (orange on white gap) -->
  <clipPath id="ring">
    <circle cx="256" cy="210" r="109"/>
  </clipPath>
  <!-- Orange area chart inside circle -->
  <path d="M148 280 L190 250 L230 260 L270 210 L310 180 L350 160 L364 280 Z" fill="url(#chart-fill)" clip-path="url(#ring)"/>
  <!-- White chart line -->
  <polyline points="148,280 190,250 230,260 270,210 310,180 350,160" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#ring)"/>
  <!-- Small upward arrow / leaf shape at top of circle -->
  <path d="M256 78 L248 95 Q256 88 264 95 Z" fill="#ffffff"/>
  <path d="M264 78 L256 66 Q270 70 268 82 Z" fill="#ffffff"/>
  <!-- Two small drip details at bottom of circle -->
  <ellipse cx="242" cy="335" rx="5" ry="8" fill="#ffffff"/>
  <ellipse cx="270" cy="340" rx="4" ry="6" fill="#ffffff"/>
  <!-- App name -->
  <text x="256" y="430" text-anchor="middle" font-size="72" font-weight="800" letter-spacing="12" fill="#ffffff" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">ECON</text>
  <text x="256" y="472" text-anchor="middle" font-size="30" font-weight="600" letter-spacing="10" fill="rgba(255,255,255,0.75)" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">LEARN</text>
</svg>
